# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    rrrrr_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    rrrrr_finger_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

rrrrr_arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_final
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
rrrrr_finger_controller:
  ros__parameters:
    joint: joint_final